<style>
.year-section{margin-bottom:110px}
.year-section:last-child{margin-bottom:60px}
.year-header{display:flex;align-items:flex-end;gap:32px;border-bottom:1px solid var(--rule);padding-bottom:20px;margin-bottom:40px}
.year-num{font-family:var(--serif);font-size:76px;line-height:.85;font-weight:300;letter-spacing:-.035em;color:var(--ink);font-style:italic}
.year-label{font-family:var(--mono);font-size:11px;color:var(--ink-2);letter-spacing:.18em;text-transform:uppercase;padding-bottom:14px}
.year-count{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--ink-2);letter-spacing:.16em;text-transform:uppercase;padding-bottom:14px}
.year-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:34px 26px}
.photo-card{display:flex;flex-direction:column}
.photo-card figure{margin:0;display:flex;flex-direction:column;height:100%}
.photo-card .img{overflow:hidden;background:var(--panel);border-radius:2px}
.photo-card img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .7s ease}
.photo-card:hover img{transform:scale(1.025)}
.photo-card figcaption{font-family:var(--sans);font-size:13px;color:var(--ink-2);margin-top:14px;display:flex;gap:14px;align-items:baseline;flex-wrap:wrap}
.photo-card figcaption .date{font-family:var(--mono);font-size:11.5px;color:#888;letter-spacing:.08em;white-space:nowrap}
.photo-card figcaption .place{color:var(--ink);font-weight:500}
.col-12{grid-column:span 1}.col-12 .img{aspect-ratio:4/3}
.col-7{grid-column:span 1}.col-7 .img{aspect-ratio:4/3}
.col-5{grid-column:span 1}.col-5 .img{aspect-ratio:4/3}
@media(max-width:900px){
  .year-grid{grid-template-columns:repeat(2,1fr);gap:22px}
  .col-12,.col-7,.col-5{grid-column:span 1}
  .col-12 .img,.col-7 .img,.col-5 .img{aspect-ratio:4/3}
  .year-num{font-size:48px}
}
</style>
</head>
